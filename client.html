<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级叫号服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .room-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .room-section h2 {
            font-size: 18px;
            color: #555;
            margin-bottom: 15px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input[type="text"], select, textarea {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.connecting {
            background: #fff3cd;
            color: #856404;
        }
        
        .student-list {
            margin-bottom: 20px;
        }
        
        .student-list h3 {
            margin-bottom: 10px;
            color: #555;
        }
        
        .students-display {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            min-height: 40px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .student-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .actions button {
            padding: 15px;
            font-size: 16px;
        }
        
        .broadcast-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }
        
        .broadcast-section h3 {
            margin-bottom: 15px;
            color: #555;
        }
        
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .quick-buttons button {
            padding: 10px;
            font-size: 14px;
            background: #28a745;
        }
        
        .quick-buttons button:hover {
            background: #218838;
        }
        
        .history {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        
        .history h3 {
            margin-bottom: 10px;
            color: #555;
        }
        
        .history-item {
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        
        .history-item .time {
            font-size: 12px;
            color: #999;
        }
        
        .hidden {
            display: none !important;
        }
        
        .client-type-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .client-type-selector label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .quick-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📢 班级叫号服务</h1>
        
        <div id="loginSection" class="room-section">
            <h2>🔌 连接设置</h2>
            
            <div class="client-type-selector">
                <label>
                    <input type="radio" name="clientType" value="teacher" checked>
                    教师端
                </label>
                <label>
                    <input type="radio" name="clientType" value="classroom">
                    教室端
                </label>
            </div>
            
            <div class="input-group">
                <input type="text" id="roomInput" placeholder="输入房间号（如：101）" maxlength="20">
                <button id="connectBtn" onclick="connect()">进入房间</button>
            </div>
            
            <div class="input-group">
                <select id="voiceSelect">
                    <option value="">选择播报声音...</option>
                </select>
            </div>
        </div>
        
        <div id="status" class="status disconnected hidden">
            未连接
        </div>
        
        <div id="mainSection" class="hidden">
            <div class="student-list">
                <h3>👥 学生名单</h3>
                <div class="input-group">
                    <textarea id="studentInput" placeholder="输入学生姓名，每行一个"></textarea>
                </div>
                <button onclick="saveStudents()">保存名单</button>
                <div id="studentsDisplay" class="students-display"></div>
            </div>
            
            <div class="actions">
                <button onclick="randomCall()">🎲 随机点名</button>
                <button onclick="clearHistory()">🗑️ 清空历史</button>
            </div>
            
            <div class="broadcast-section">
                <h3>📣 广播消息</h3>
                <div class="input-group">
                    <input type="text" id="broadcastInput" placeholder="输入广播内容">
                    <button onclick="sendBroadcast()">发送</button>
                </div>
                
                <div class="quick-buttons">
                    <button onclick="quickBroadcast('请安静')">请安静</button>
                    <button onclick="quickBroadcast('准备上课')">准备上课</button>
                    <button onclick="quickBroadcast('下课休息')">下课休息</button>
                    <button onclick="quickBroadcast('请交作业')">请交作业</button>
                    <button onclick="quickBroadcast('集合排队')">集合排队</button>
                    <button onclick="quickBroadcast('翻书提醒')">翻书提醒</button>
                </div>
            </div>
            
            <div class="history">
                <h3>📋 播报历史</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let room = null;
        let students = [];
        let history = [];
        let isConnected = false;
        
        // 初始化语音选择
        function initVoiceSelect() {
            const voiceSelect = document.getElementById('voiceSelect');
            const voices = window.speechSynthesis.getVoices();
            
            // 清空选项
            voiceSelect.innerHTML = '<option value="">选择播报声音...</option>';
            
            // 添加所有可用声音
            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})`;
                if (voice.lang && voice.lang.startsWith('zh')) {
                    option.textContent = '🇨🇳 ' + option.textContent;
                }
                voiceSelect.appendChild(option);
            });
        }
        
        // 等待语音加载
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = initVoiceSelect;
            initVoiceSelect();
        }
        
        function connect() {
            const roomInput = document.getElementById('roomInput').value.trim();
            const clientType = document.querySelector('input[name="clientType"]:checked').value;
            
            if (!roomInput) {
                alert('请输入房间号');
                return;
            }
            
            room = roomInput;
            
            // 确定 WebSocket URL
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                isConnected = true;
                updateStatus('已连接 - 房间: ' + room, 'connected');
                
                // 发送加入房间消息
                ws.send(JSON.stringify({
                    type: 'join',
                    room: room,
                    clientType: clientType
                }));
                
                // 显示主界面
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('status').classList.remove('hidden');
                
                // 如果是教室端，隐藏编辑功能
                if (clientType === 'classroom') {
                    document.querySelector('.student-list button').style.display = 'none';
                    document.getElementById('studentInput').style.display = 'none';
                    document.querySelector('.actions').style.display = 'none';
                    document.querySelector('.broadcast-section .input-group').style.display = 'none';
                    document.querySelector('.quick-buttons').style.display = 'none';
                }
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onclose = () => {
                isConnected = false;
                updateStatus('连接已断开', 'disconnected');
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus('连接错误', 'disconnected');
            };
            
            updateStatus('连接中...', 'connecting');
        }
        
        function handleMessage(data) {
            switch (data.type) {
                case 'joined':
                    console.log('Joined room with', data.clientCount, 'clients');
                    break;
                    
                case 'call':
                    speak(data.name + '，请回答');
                    addToHistory('点名: ' + data.name);
                    break;
                    
                case 'broadcast':
                    speak(data.message);
                    addToHistory('广播: ' + data.message);
                    break;
                    
                case 'student_list':
                    students = data.students;
                    displayStudents();
                    break;
                    
                case 'user_joined':
                    console.log('User joined:', data.clientType);
                    break;
            }
        }
        
        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
        
        function saveStudents() {
            const input = document.getElementById('studentInput').value;
            students = input.split('\n').map(s => s.trim()).filter(s => s);
            displayStudents();
            
            // 发送给学生列表到房间
            if (ws && isConnected) {
                ws.send(JSON.stringify({
                    type: 'student_list',
                    students: students
                }));
            }
        }
        
        function displayStudents() {
            const display = document.getElementById('studentsDisplay');
            display.innerHTML = students.map(s => `<span class="student-tag">${s}</span>`).join('');
        }
        
        function randomCall() {
            if (students.length === 0) {
                alert('请先添加学生名单');
                return;
            }
            
            const randomStudent = students[Math.floor(Math.random() * students.length)];
            
            if (ws && isConnected) {
                ws.send(JSON.stringify({
                    type: 'call',
                    name: randomStudent
                }));
            }
            
            speak(randomStudent + '，请回答');
            addToHistory('点名: ' + randomStudent);
        }
        
        function sendBroadcast() {
            const message = document.getElementById('broadcastInput').value.trim();
            if (!message) return;
            
            if (ws && isConnected) {
                ws.send(JSON.stringify({
                    type: 'broadcast',
                    message: message
                }));
            }
            
            speak(message);
            addToHistory('广播: ' + message);
            document.getElementById('broadcastInput').value = '';
        }
        
        function quickBroadcast(message) {
            if (message === '翻书提醒') {
                message = '请同学们翻到课本指定页面';
            }
            
            if (ws && isConnected) {
                ws.send(JSON.stringify({
                    type: 'broadcast',
                    message: message
                }));
            }
            
            speak(message);
            addToHistory('广播: ' + message);
        }
        
        function speak(text) {
            if (!window.speechSynthesis) {
                console.log('Speech synthesis not supported');
                return;
            }
            
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            
            // 使用选择的声音
            const voiceSelect = document.getElementById('voiceSelect');
            const voices = window.speechSynthesis.getVoices();
            if (voiceSelect.value && voices[voiceSelect.value]) {
                utterance.voice = voices[voiceSelect.value];
            }
            
            window.speechSynthesis.speak(utterance);
        }
        
        function addToHistory(text) {
            const time = new Date().toLocaleTimeString('zh-CN');
            history.unshift({ text, time });
            if (history.length > 50) history.pop();
            renderHistory();
        }
        
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div>${item.text}</div>
                    <div class="time">${item.time}</div>
                </div>
            `).join('');
        }
        
        function clearHistory() {
            history = [];
            renderHistory();
        }
        
        // 回车键发送广播
        document.getElementById('broadcastInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBroadcast();
        });
        
        // 回车键连接
        document.getElementById('roomInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>
